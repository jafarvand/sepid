<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sepidAI | مدیریت اطلاعات پایه</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="loginGate" class="login-gate">
      <div class="login-panel">
        <div class="login-brand">
          <div class="brand-mark" aria-hidden="true">
            <span class="logo-cloud"></span>
            <span class="logo-core">س</span>
            <span class="logo-dot"></span>
          </div>
          <div>
            <h1>sepidAI</h1>
            <p>ورود به سامانه</p>
          </div>
        </div>
        <form id="loginForm" class="login-form">
          <label class="login-field">
            <span>نام کاربری</span>
            <input id="loginUsername" name="username" type="text" autocomplete="username" />
          </label>
          <label class="login-field">
            <span>رمز عبور</span>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" />
          </label>
          <p id="loginError" class="login-error" hidden>نام کاربری یا رمز عبور نادرست است.</p>
          <button id="loginSubmitBtn" class="primary-btn" type="submit">ورود</button>
        </form>
      </div>
    </section>

    <div class="app-shell">
      <aside class="sidebar" aria-label="منوی سیستم‌ها">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span class="logo-cloud"></span>
            <span class="logo-core">س</span>
            <span class="logo-dot"></span>
          </div>
          <div>
            <h1>sepidAI</h1>
            <p>مدیریت اطلاعات پایه</p>
          </div>
          <button id="sideMenuCloseBtn" class="sidebar-close" type="button" aria-label="بستن منو">×</button>
        </div>
        <nav id="systemMenu" class="system-menu"></nav>
      </aside>
      <button id="mobileMenuBackdrop" class="mobile-menu-backdrop" type="button" aria-label="بستن منو"></button>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">سامانه‌های مرتبط با نسخه پشتیبان sepidAI 5.2.5</p>
            <h2 id="pageTitle">اطلاعات پایه</h2>
          </div>
          <div class="top-actions">
            <button id="menuToggleBtn" class="ghost-btn" type="button">بستن منو</button>
            <button id="editorToggleBtn" class="ghost-btn" type="button">بستن پنل</button>
            <button id="fullscreenBtn" class="ghost-btn" type="button">نمای تمام‌صفحه جدول</button>
            <button id="exportBtn" class="ghost-btn" type="button">خروجی CSV</button>
            <button id="logoutBtn" class="ghost-btn" type="button">خروج</button>
            <label class="ghost-btn file-action">
              ورود JSON
              <input id="importInput" type="file" accept="application/json" />
            </label>
            <button id="sqlImportBtn" class="ghost-btn" type="button">ورود از SQL Server</button>
            <button id="resetBtn" class="danger-btn" type="button">بازنشانی داده نمونه</button>
          </div>
        </header>

        <section class="module-tabs" id="moduleTabs" aria-label="زیرمنوهای اطلاعات پایه"></section>

        <section class="content-grid">
          <div class="panel table-panel">
            <div class="toolbar">
              <div class="search-box">
                <label for="searchInput">جستجو</label>
                <input id="searchInput" type="search" placeholder="عبارت، کد، عنوان یا توضیح..." />
              </div>
              <div class="filter-box compact-filter">
                <label for="fieldFilter">فیلتر ستون</label>
                <select id="fieldFilter"></select>
              </div>
              <div class="filter-box">
                <label for="valueFilter">مقدار فیلتر</label>
                <input id="valueFilter" type="text" placeholder="مثلا فعال یا تهران" />
              </div>
              <div class="filter-box compact-filter">
                <label for="pageSizeSelect">اندازه صفحه</label>
                <select id="pageSizeSelect">
                  <option value="50">۵۰</option>
                  <option value="100" selected>۱۰۰</option>
                  <option value="200">۲۰۰</option>
                  <option value="500">۵۰۰</option>
                </select>
              </div>
              <div class="filter-box compact-filter goto-filter">
                <label for="gotoPageInput">برو به صفحه</label>
                <div class="inline-input">
                  <input id="gotoPageInput" type="number" min="1" inputmode="numeric" />
                  <button id="gotoPageBtn" class="secondary-btn" type="button">برو</button>
                </div>
              </div>
              <button id="clearFiltersBtn" class="ghost-btn" type="button">پاک کردن فیلتر</button>
              <button id="addBtn" class="primary-btn" type="button">ثبت رکورد جدید</button>
            </div>

            <div class="meta-row">
              <span id="recordCount">۰ رکورد</span>
              <span id="tableHint">برای مرتب‌سازی روی عنوان ستون کلیک کنید. با کلیدهای بالا و پایین بین ردیف‌ها جابه‌جا شوید.</span>
            </div>

            <div id="tableWrap" class="table-wrap" tabindex="0">
              <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
              </table>
            </div>
          </div>

          <aside class="panel form-panel">
            <div class="form-header">
              <div>
                <p id="formMode">رکورد جدید</p>
                <h3 id="activeTableName">-</h3>
              </div>
              <div class="form-header-actions">
                <button id="clearFormBtn" class="ghost-btn" type="button">پاک کردن فرم</button>
                <button id="formPanelCloseBtn" class="ghost-btn" type="button">بستن پنل</button>
              </div>
            </div>
            <form id="editorForm" class="editor-form"></form>
          </aside>
        </section>
      </main>
    </div>

    <template id="emptyStateTemplate">
      <tr>
        <td class="empty-state" colspan="20">رکوردی با این شرایط پیدا نشد.</td>
      </tr>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
