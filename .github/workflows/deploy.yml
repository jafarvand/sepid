name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.yml"
          target: "${{ secrets.DEPLOY_PATH }}"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}:latest
          APP_PORT: ${{ vars.APP_PORT || '5173' }}
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_PORT: ${{ vars.SQL_PORT || '1433' }}
          SQL_DATABASE: ${{ vars.SQL_DATABASE || 'Sepidar_Analysis_New' }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          SQL_ENCRYPT: ${{ vars.SQL_ENCRYPT || 'false' }}
          SQL_TRUST_CERT: ${{ vars.SQL_TRUST_CERT || 'true' }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE_NAME,APP_PORT,SQL_SERVER,SQL_PORT,SQL_DATABASE,SQL_USER,SQL_PASSWORD,SQL_ENCRYPT,SQL_TRUST_CERT,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            cat > .env <<EOF
            IMAGE_NAME=$IMAGE_NAME
            APP_PORT=$APP_PORT
            SQL_SERVER=$SQL_SERVER
            SQL_PORT=$SQL_PORT
            SQL_DATABASE=$SQL_DATABASE
            SQL_USER=$SQL_USER
            SQL_PASSWORD=$SQL_PASSWORD
            SQL_ENCRYPT=$SQL_ENCRYPT
            SQL_TRUST_CERT=$SQL_TRUST_CERT
            EOF
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
