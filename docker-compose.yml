services:
  sepidai-web:
    image: ${IMAGE_NAME:-ghcr.io/OWNER/REPO:latest}
    container_name: sepidai-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5173}:5173"
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      SQL_SERVER: ${SQL_SERVER}
      SQL_PORT: ${SQL_PORT:-1433}
      SQL_DATABASE: ${SQL_DATABASE:-sepidAI_Analysis_New}
      SQL_USER: ${SQL_USER}
      SQL_PASSWORD: ${SQL_PASSWORD}
      SQL_ENCRYPT: ${SQL_ENCRYPT:-false}
      SQL_TRUST_CERT: ${SQL_TRUST_CERT:-true}


